# Publishes @trustware/sdk (production) and @trustware/sdk-staging (staging)
# to npm. Triggered by version tags — never by branch pushes.
#
# Tag conventions
#   v1.2.3              → @trustware/sdk@1.2.3            → env npm-production
#   v1.2.3-staging.5    → @trustware/sdk-staging@1.2.3-staging.5 → env npm-staging
#
# Why tag-driven (and not workflow_run): `workflow_run` jobs execute in the
# repo's default-branch context. The npm-production environment's deployment
# branch policy can only allow specific refs, and a workflow_run originating
# from a CI completion on `main` still runs in the (current) default branch
# `staging` context — which the env rejects. Tag pushes run in the tag's
# context, which we allow via tag-pattern policies on each environment.
#
# CI gating: tags should only be cut from commits that already passed CI on
# their source branch. This workflow runs `npm run validate` again before
# publishing as belt-and-suspenders.

name: Publish

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+-staging.[0-9]+'
  workflow_dispatch:

permissions: {}

jobs:
  publish-staging:
    if: contains(github.ref_name, '-staging.')
    runs-on: ubuntu-latest
    environment: npm-staging
    permissions:
      id-token: write   # Required for npm trusted publishing (OIDC)
      contents: read
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: 'npm'
          registry-url: 'https://registry.npmjs.org'

      # setup-node writes `always-auth=false` to ~/.npmrc when registry-url
      # is set; npm 11+ no longer recognizes that key and emits a warning on
      # every command. Strip it.
      - name: Strip deprecated always-auth from npmrc
        run: sed -i '/^always-auth=/d' "$HOME/.npmrc" || true

      - name: Install dependencies
        run: npm ci

      - name: Validate
        run: npm run validate

      # Rewrite name + version, then build. Build must run AFTER this rewrite
      # so SDK_VERSION baked into the bundle matches the published npm version.
      - name: Prepare staging package
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          node -e "
            const pkg = require('./package.json');
            pkg.name = '@trustware/sdk-staging';
            pkg.version = '$VERSION';
            pkg.publishConfig = { registry: 'https://registry.npmjs.org/' };
            require('fs').writeFileSync('package.json', JSON.stringify(pkg, null, 2));
          "

      - name: Build (staging API)
        run: npm run build
        env:
          TRUSTWARE_API_ROOT: ${{ secrets.TRUSTWARE_API_ROOT }}
          TRUSTWARE_GTM_ID: ${{ secrets.TRUSTWARE_GTM_ID }}
          TRUSTWARE_WALLETCONNECT_PROJECT_ID: ${{ secrets.TRUSTWARE_WALLETCONNECT_PROJECT_ID }}

      - name: Publish to npm (staging)
        run: npx npm@latest publish --access public --tag staging --provenance

  publish-production:
    if: ${{ !contains(github.ref_name, '-staging.') }}
    runs-on: ubuntu-latest
    environment: npm-production
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v5

      - name: Verify tag matches package.json version
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PKG_VERSION=$(node -p "require('./package.json').version")
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "::error::Tag $GITHUB_REF_NAME does not match package.json version $PKG_VERSION"
            exit 1
          fi

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: 'npm'
          registry-url: 'https://registry.npmjs.org'

      - name: Strip deprecated always-auth from npmrc
        run: sed -i '/^always-auth=/d' "$HOME/.npmrc" || true

      - name: Install dependencies
        run: npm ci

      - name: Validate
        run: npm run validate

      - name: Build (production API)
        run: npm run build
        env:
          TRUSTWARE_API_ROOT: ${{ secrets.TRUSTWARE_API_ROOT }}
          TRUSTWARE_GTM_ID: ${{ secrets.TRUSTWARE_GTM_ID }}
          TRUSTWARE_WALLETCONNECT_PROJECT_ID: ${{ secrets.TRUSTWARE_WALLETCONNECT_PROJECT_ID }}

      - name: Publish to npm
        run: npx npm@latest publish --access public --provenance
