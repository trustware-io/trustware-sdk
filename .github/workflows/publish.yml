name: Publish

on:
  push:
    branches: [main, staging]
    paths:
      - 'package.json'

permissions: {}

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: npm
    permissions:
      id-token: write   # Required for npm trusted publishing (OIDC)
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Build (main → production API)
        if: github.ref == 'refs/heads/main'
        run: npm run build

      - name: Build (staging → staging API)
        if: github.ref == 'refs/heads/staging'
        run: npm run build
        env:
          TRUSTWARE_API_ROOT: https://bv-staging-api.trustware.io

      - name: Prepare staging package
        if: github.ref == 'refs/heads/staging'
        run: |
          node -e "
            const pkg = require('./package.json');
            pkg.name = '@trustware/sdk-staging';
            pkg.version = pkg.version + '-staging.${{ github.run_number }}';
            pkg.publishConfig = { registry: 'https://registry.npmjs.org/' };
            require('fs').writeFileSync('package.json', JSON.stringify(pkg, null, 2));
          "

      - name: Publish to npm (staging)
        if: github.ref == 'refs/heads/staging'
        run: npm publish --access public --tag staging --provenance
        env:
          TRUSTWARE_API_ROOT: https://bv-staging-api.trustware.io

      - name: Publish to npm (main)
        if: github.ref == 'refs/heads/main'
        run: npm publish --access public --provenance
