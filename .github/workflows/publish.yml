# Publishes @trustware/sdk to npm on version changes (after CI passes)
name: Publish

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main, staging]

permissions: {}

jobs:
  publish:
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    environment: ${{ github.event.workflow_run.head_branch == 'main' && 'npm-production' || 'npm-staging' }}
    permissions:
      id-token: write   # Required for npm trusted publishing (OIDC)
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_branch }}

      - name: Check if version changed
        id: version-check
        run: |
          VERSION=$(node -p "require('./package.json').version")
          if npm view @trustware/sdk version 2>/dev/null | grep -qx "$VERSION"; then
            echo "published=true" >> "$GITHUB_OUTPUT"
          else
            echo "published=false" >> "$GITHUB_OUTPUT"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Skip if already published
        if: steps.version-check.outputs.published == 'true'
        run: |
          echo "Version ${{ steps.version-check.outputs.version }} already published, skipping."

      - uses: actions/setup-node@v4
        if: steps.version-check.outputs.published == 'false'
        with:
          node-version: 22
          cache: 'npm'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        if: steps.version-check.outputs.published == 'false'
        run: npm ci

      - name: Build (main → production API)
        if: steps.version-check.outputs.published == 'false' && github.event.workflow_run.head_branch == 'main'
        run: npm run build
        env:
          TRUSTWARE_API_ROOT: ${{ secrets.TRUSTWARE_API_ROOT }}
          TRUSTWARE_GTM_ID: ${{ secrets.TRUSTWARE_GTM_ID }}

      - name: Build (staging → staging API)
        if: steps.version-check.outputs.published == 'false' && github.event.workflow_run.head_branch == 'staging'
        run: npm run build
        env:
          TRUSTWARE_API_ROOT: ${{ secrets.TRUSTWARE_API_ROOT }}
          TRUSTWARE_GTM_ID: ${{ secrets.TRUSTWARE_GTM_ID }}

      - name: Prepare staging package
        if: steps.version-check.outputs.published == 'false' && github.event.workflow_run.head_branch == 'staging'
        run: |
          node -e "
            const pkg = require('./package.json');
            pkg.name = '@trustware/sdk-staging';
            pkg.version = pkg.version + '-staging.${{ github.run_number }}';
            pkg.publishConfig = { registry: 'https://registry.npmjs.org/' };
            require('fs').writeFileSync('package.json', JSON.stringify(pkg, null, 2));
          "

      - name: Publish to npm (staging)
        if: steps.version-check.outputs.published == 'false' && github.event.workflow_run.head_branch == 'staging'
        run: npx npm@latest publish --access public --tag staging --provenance
        env:
          TRUSTWARE_API_ROOT: https://bv-staging-api.trustware.io

      - name: Publish to npm (main)
        if: steps.version-check.outputs.published == 'false' && github.event.workflow_run.head_branch == 'main'
        run: npx npm@latest publish --access public --provenance
