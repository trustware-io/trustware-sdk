# git-cliff configuration — generates CHANGELOG.md and GitHub Release notes
# from Conventional Commits. See https://git-cliff.org/docs/configuration
#
# Tag policy: only X.Y.Z tags are version boundaries. Staging tags
# (X.Y.Z-staging.N) are ignored, so their commits roll into the next
# production release section.

[changelog]
header = """# Changelog

All notable changes to this project will be documented in this file.

The format is based on [Keep a Changelog](https://keepachangelog.com/en/1.0.0/),
and this project adheres to [Semantic Versioning](https://semver.org/spec/v2.0.0.html).

"""
body = """
{% if version -%}
## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% else -%}
## [Unreleased]
{% endif %}
{% for group, commits in commits | group_by(attribute="group") %}
### {{ group }}

{% for commit in commits -%}
- {{ commit.message | split(pat="\n") | first | upper_first }}{% if commit.remote.pr_number %} (#{{ commit.remote.pr_number }}){% endif %}
{% endfor %}
{% endfor %}
"""
trim = true
footer = ""

[git]
conventional_commits = true
filter_unconventional = true
split_commits = false
protect_breaking_commits = false
filter_commits = true
topo_order = false
sort_commits = "oldest"
# Only production tags are version boundaries; staging tags collapse into the
# next production release.
tag_pattern = "^v[0-9]+\\.[0-9]+\\.[0-9]+$"
skip_tags = "^v[0-9]+\\.[0-9]+\\.[0-9]+-staging\\.[0-9]+$"

commit_parsers = [
  # Drop release/CI-release housekeeping commits — they're noise in the changelog.
  { message = "^chore\\(release\\)", skip = true },
  { message = "^ci\\(release\\)", skip = true },

  { message = "^feat",     group = "Added" },
  { message = "^fix",      group = "Fixed" },
  { message = "^perf",     group = "Changed" },
  { message = "^refactor", group = "Changed" },
  { message = "^revert",   group = "Changed" },
  { message = "^docs",     group = "Internal" },
  { message = "^test",     group = "Internal" },
  { message = "^build",    group = "Internal" },
  { message = "^ci",       group = "Internal" },
  { message = "^chore",    group = "Internal" },
]
